spring.application.name=olive-traceability-backend
server.port=8080

# ---------------------------------------------------------------------------
# H2 in-memory database (default para development)
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:trazabilidad;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------------------------------------------------------------------------
# Blockchain / Ganache
# Poner blockchain.enabled=true SOLO si:
#   1. Ganache is running on port 7545
#   2. The contract has been deployed (mirar contracts/scripts/deploy.js)
#   3. Hemos rellenado contract.address y wallet.privateKey debajo
# ---------------------------------------------------------------------------

blockchain.enabled=true
blockchain.node.url=http://127.0.0.1:7545
blockchain.contract.address=0xB406c925BcD394c65c086Eced36cd64Eaeb99d0b
blockchain.wallet.privateKey=${BLOCKCHAIN_PRIVATE_KEY:0xeeef6449ecb7fb26b48a215bc86408e9d3709ddc0ca92118879e2018598768e7}

# ---------------------------------------------------------------------------
# MQTT / IoT configuration
# Poner mqtt.enabled=false to disable MQTT (el resto del sistema sigue funcionando)
# ---------------------------------------------------------------------------
mqtt.enabled=true
mqtt.broker.url=tcp://localhost:1883
mqtt.client.id=olive-backend
mqtt.topic.request=olive/scale/request
mqtt.topic.response=olive/scale/response
mqtt.request.timeout.seconds=15