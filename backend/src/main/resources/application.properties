spring.application.name=olive-traceability-backend
server.port=8080

# ---------------------------------------------------------------------------
# H2 in-memory database (default para development)
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:trazabilidad;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------------------------------------------------------------------------
# Blockchain / Ganache
# Poner blockchain.enabled=true SOLO si:
#   1. Ganache está en ejecución en el puerto 7545
#   2. El contrato ha sido desplegado (ver contracts/scripts/deploy.js)
#   3. Hemos rellenado contract.address y wallet.privateKey debajo
# ---------------------------------------------------------------------------

blockchain.enabled=true
blockchain.node.url=http://127.0.0.1:7545
blockchain.contract.address=0xcd99A25153bc49510EAEB897c713996e83284cd3
blockchain.wallet.privateKey=${BLOCKCHAIN_PRIVATE_KEY}

# ---------------------------------------------------------------------------
# MQTT / IoT configuration
# Poner mqtt.enabled=false para desactivar MQTT (el resto del sistema sigue funcionando)
# ---------------------------------------------------------------------------
mqtt.enabled=true
mqtt.broker.url=tcp://localhost:1883
mqtt.client.id=olive-backend
mqtt.topic.cinta.request=olive/cinta/request
mqtt.topic.cinta.response=olive/cinta/response

mqtt.topic.lavado.request=olive/lavado/request
mqtt.topic.lavado.response=olive/lavado/response

mqtt.topic.batido.request=olive/batido/request
mqtt.topic.batido.response=olive/batido/response

mqtt.topic.decanter.request=olive/decanter/request
mqtt.topic.decanter.response=olive/decanter/response

mqtt.topic.extraccion.request=olive/extraccion/request
mqtt.topic.extraccion.response=olive/extraccion/response

mqtt.topic.camionlleno.request=olive/camionlleno/request
mqtt.topic.camionlleno.response=olive/camionlleno/response

mqtt.topic.camionvacio.request=olive/camionvacio/request
mqtt.topic.camionvacio.response=olive/camionvacio/response

mqtt.topic.molienda.request=olive/molienda/request
mqtt.topic.molienda.response=olive/molienda/response

mqtt.topic.centrifugadora.request=olive/centrifugadora/request
mqtt.topic.centrifugadora.response=olive/centrifugadora/response

mqtt.request.timeout.seconds=15